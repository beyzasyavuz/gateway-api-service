events {
    worker_connections 1024;
}

http {
    # IP başına saniyede maksimum 2 isteğe izin veren limit tanımı
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    server {
        listen 80;

        location / {
            # Limiti uyguluyoruz: anlık 3 isteğe kadar tolerans göster, gerisini engelle
            limit_req zone=api_limit burst=3 nodelay;

            proxy_pass http://fastapi_app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
