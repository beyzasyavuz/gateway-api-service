services:
  web_app:
    build: ./app
    container_name: devops_fastapi_app
    ports:
      - "8000:8000"
    networks:
      - gateway_net

  proxy:
    build: ./nginx
    container_name: devops_nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web_app
    networks:
      - gateway_net

  prometheus:
    image: prom/prometheus:latest
    container_name: devops_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - gateway_net

  grafana:
    image: grafana/grafana:latest
    container_name: devops_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - gateway_net

networks:
  gateway_net:
    driver: bridge
