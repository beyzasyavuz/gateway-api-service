events {
    worker_connections 1024;
}

http {

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # IP başına saniyede max 2 istek
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;
    limit_req_status 429;

    server {
        listen 80;

        location / {
            limit_req zone=api_limit burst=3 nodelay; # Anlık 3 sıçramaya izin ver, gerisini engelle

            # Önbellekleme Kuralları
            proxy_cache my_cache;                      # Yukarıda tanımladığımız zone
            proxy_cache_valid 200 302 10s;             # Başarılı (200) yanıtları 10 saniye sakla
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;

            add_header X-Cache-Status $upstream_cache_status; # Test için Response Header Ekleme (HIT mi MISS mi görelim)

            proxy_pass http://web_app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}